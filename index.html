<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roof Ridge Generator</title>
    <link rel="stylesheet" href="/src/style.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "/node_modules/three/build/three.module.js",
          "three/addons/": "/node_modules/three/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="/src/main.js?v=20260319-1"></script>
  </head>
  <body>
    <main class="app">
      <canvas id="scene"></canvas>
      <div class="panel">
        <div class="panel__title">Roof Ridge Generator</div>
        <div id="status" class="panel__status">Generating...</div>

        <div class="seed-row">
          <label class="text-input">
            <span>Seed</span>
            <input id="seed" type="number" value="24681357" min="1" max="4294967295" step="1" />
          </label>
          <button id="randomize" class="button">Randomize</button>
        </div>

        <label class="control">
          <span>Branch Depth <output id="max-depth-value"></output></span>
          <input id="max-depth" type="range" min="1" max="8" step="1" value="6" />
        </label>

        <label class="control">
          <span>Initial Arms <output id="initial-arms-value"></output></span>
          <input id="initial-arms" type="range" min="3" max="8" step="1" value="4" />
        </label>

        <label class="control">
          <span>Trunk Length <output id="trunk-length-value"></output></span>
          <input id="trunk-length" type="range" min="24" max="140" step="1" value="84" />
        </label>

        <label class="control">
          <span>Length Decay <output id="length-decay-value"></output></span>
          <input id="length-decay" type="range" min="0.45" max="0.92" step="0.01" value="0.72" />
        </label>

        <label class="control">
          <span>Branch Chance <output id="branch-chance-value"></output></span>
          <input id="branch-chance" type="range" min="0" max="0.95" step="0.01" value="0.44" />
        </label>

        <label class="control">
          <span>90deg Deviation <output id="split-angle-value"></output></span>
          <input id="split-angle" type="range" min="0" max="35" step="1" value="10" />
        </label>

        <label class="control">
          <span>Direction Jitter <output id="jitter-value"></output></span>
          <input id="jitter" type="range" min="0" max="30" step="1" value="10" />
        </label>

        <label class="control">
          <span>Ridge Height <output id="ridge-height-value"></output></span>
          <input id="ridge-height" type="range" min="6" max="30" step="0.5" value="14" />
        </label>

        <label class="control">
          <span>Height Decay <output id="height-decay-value"></output></span>
          <input id="height-decay" type="range" min="0.5" max="0.96" step="0.01" value="0.81" />
        </label>

        <label class="control">
          <span>Roof Half Width <output id="roof-width-value"></output></span>
          <input id="roof-width" type="range" min="2" max="26" step="0.5" value="8" />
        </label>

        <label class="control">
          <span>Width Decay <output id="width-decay-value"></output></span>
          <input id="width-decay" type="range" min="0.55" max="0.99" step="0.01" value="0.85" />
        </label>

        <div class="button-row">
          <button id="regenerate" class="button button--ghost">Regenerate</button>
          <button id="sample-burst" class="button button--ghost">Sample x12</button>
        </div>

        <button id="download-form" class="button button--ghost">Download Form (.obj)</button>

        <label class="toggle">
          <input id="toggle-ridges" type="checkbox" checked />
          <span>Ridge Lines</span>
        </label>

        <label class="toggle">
          <input id="toggle-surfaces" type="checkbox" checked />
          <span>Surfaces</span>
        </label>

        <div id="stats" class="panel__stats">-</div>
      </div>
      <div class="hint">Left drag orbit. Right drag pan. Wheel zoom. Space randomizes seed.</div>
    </main>
  </body>
</html>
